spring.application.name=backend-test

# H2 Database (in-memory) for tests
spring.datasource.url=jdbc:h2:mem:outseradb-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# CSV file fixture for tests
csv.file=award-intervals-fixture.csv
